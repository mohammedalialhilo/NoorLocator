name: NoorLocator Azure App Service

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  DOTNET_VERSION: 10.0.x
  SOLUTION_PATH: NoorLocator.sln
  PACKAGE_SCRIPT_PATH: scripts/package-app-service-api.ps1
  VERIFY_PACKAGE_SCRIPT_PATH: scripts/verify-app-service-package.ps1
  TEST_RESULTS_PATH: artifacts/test-results
  PUBLISH_OUTPUT_PATH: artifacts/publish/api
  DEPLOY_PACKAGE_PATH: artifacts/packages/noorlocator-api-appservice.zip
  TEST_RESULTS_ARTIFACT_NAME: noorlocator-test-results
  PUBLISH_ARTIFACT_NAME: noorlocator-appservice-publish
  PACKAGE_ARTIFACT_NAME: noorlocator-appservice-package
  PACKAGE_FILE_NAME: noorlocator-api-appservice.zip

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build_test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build solution
        run: dotnet build $env:SOLUTION_PATH -c $env:BUILD_CONFIGURATION --no-restore

      - name: Run automated tests
        run: >
          dotnet test $env:SOLUTION_PATH
          -c $env:BUILD_CONFIGURATION
          --no-build
          --logger "trx;LogFilePrefix=noorlocator-tests"
          --results-directory $env:TEST_RESULTS_PATH

      - name: Summarize test results
        if: always()
        run: |
          function Get-Count {
              param($Value)

              if ($null -eq $Value -or [string]::IsNullOrWhiteSpace([string]$Value)) {
                  return 0
              }

              return [int]$Value
          }

          $trxFiles = Get-ChildItem -Path $env:TEST_RESULTS_PATH -Filter *.trx -Recurse -ErrorAction SilentlyContinue
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Test results"

          if (-not $trxFiles) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "No TRX files were produced."
              exit 0
          }

          $totals = @{
              Total = 0
              Passed = 0
              Failed = 0
              Skipped = 0
          }

          foreach ($trxFile in $trxFiles) {
              [xml]$trx = Get-Content -Path $trxFile.FullName
              $counters = $trx.TestRun.ResultSummary.Counters

              $totals.Total += Get-Count $counters.total
              $totals.Passed += Get-Count $counters.passed
              $totals.Failed += (Get-Count $counters.failed) + (Get-Count $counters.error) + (Get-Count $counters.timeout) + (Get-Count $counters.aborted)
              $totals.Skipped += (Get-Count $counters.notExecuted) + (Get-Count $counters.inconclusive) + (Get-Count $counters.pending)
          }

          $summaryLines = @(
              "| Metric | Count |",
              "| --- | ---: |",
              "| Total | $($totals.Total) |",
              "| Passed | $($totals.Passed) |",
              "| Failed | $($totals.Failed) |",
              "| Skipped | $($totals.Skipped) |"
          )

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($summaryLines -join [Environment]::NewLine)

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TEST_RESULTS_ARTIFACT_NAME }}
          path: ${{ env.TEST_RESULTS_PATH }}
          if-no-files-found: warn
          retention-days: 14

  publish:
    name: Publish App Service package
    runs-on: ubuntu-latest
    needs: build_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build App Service package
        run: |
          & (Join-Path $env:GITHUB_WORKSPACE $env:PACKAGE_SCRIPT_PATH)

      - name: Verify publish output and deployment package
        run: |
          & (Join-Path $env:GITHUB_WORKSPACE $env:VERIFY_PACKAGE_SCRIPT_PATH)

      - name: Upload publish directory
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PUBLISH_ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_OUTPUT_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ARTIFACT_NAME }}
          path: ${{ env.DEPLOY_PACKAGE_PATH }}
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: ${{ steps.deploy_to_webapp.outputs.webapp-url }}
    concurrency:
      group: noorlocator-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate deployment configuration
        env:
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          $requiredSettings = @{
              AZURE_WEBAPP_NAME = $env:AZURE_WEBAPP_NAME
              AZURE_CLIENT_ID = $env:AZURE_CLIENT_ID
              AZURE_TENANT_ID = $env:AZURE_TENANT_ID
              AZURE_SUBSCRIPTION_ID = $env:AZURE_SUBSCRIPTION_ID
          }

          foreach ($setting in $requiredSettings.GetEnumerator()) {
              if ([string]::IsNullOrWhiteSpace($setting.Value)) {
                  throw "Missing required deployment configuration: $($setting.Key)."
              }
          }

      - name: Download deployment package
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.PACKAGE_ARTIFACT_NAME }}
          path: deploy-package

      - name: Resolve deployment package path
        run: |
          $packagePath = Join-Path (Join-Path $env:GITHUB_WORKSPACE "deploy-package") $env:PACKAGE_FILE_NAME
          if (-not (Test-Path $packagePath)) {
              throw "Deployment package was not found at '$packagePath'."
          }

          "DEPLOY_PACKAGE_FILE=$packagePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify downloaded package contents
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipArchive = [System.IO.Compression.ZipFile]::OpenRead($env:DEPLOY_PACKAGE_FILE)

          try {
              $entries = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
              foreach ($entry in $zipArchive.Entries) {
                  [void]$entries.Add($entry.FullName.Replace('\', '/'))
              }

              foreach ($requiredEntry in @(
                  "NoorLocator.Api.dll",
                  "frontend/index.html",
                  "frontend/assets/logo_bkg.png"
              )) {
                  if (-not $entries.Contains($requiredEntry)) {
                      throw "Downloaded deployment package is missing '$requiredEntry'."
                  }
              }
          }
          finally {
              $zipArchive.Dispose()
          }

      - name: Azure login with OpenID Connect
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy_to_webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.DEPLOY_PACKAGE_FILE }}

      - name: Smoke test deployed application
        run: |
          function Invoke-VerifiedRequest {
              param(
                  [Parameter(Mandatory = $true)]
                  [string]$Uri,
                  [Parameter(Mandatory = $true)]
                  [string]$Description,
                  [string]$ExpectedContent = "",
                  [int]$ExpectedStatusCode = 200
              )

              $lastFailure = ""

              for ($attempt = 1; $attempt -le 12; $attempt++) {
                  try {
                      $response = Invoke-WebRequest -Uri $Uri -TimeoutSec 30 -MaximumRedirection 0 -SkipHttpErrorCheck
                      if ($response.StatusCode -eq $ExpectedStatusCode) {
                          if ([string]::IsNullOrWhiteSpace($ExpectedContent) -or $response.Content.Contains($ExpectedContent)) {
                              return $response
                          }

                          $lastFailure = "$Description returned HTTP $($response.StatusCode), but the response body did not contain '$ExpectedContent'."
                      }
                      else {
                          $lastFailure = "$Description returned HTTP $($response.StatusCode) instead of $ExpectedStatusCode."
                      }
                  }
                  catch {
                      $lastFailure = $_.Exception.Message
                  }

                  Start-Sleep -Seconds 10
              }

              throw "Smoke test failed for $Description at '$Uri'. $lastFailure"
          }

          $baseUrl = "${{ steps.deploy_to_webapp.outputs.webapp-url }}"
          if ([string]::IsNullOrWhiteSpace($baseUrl)) {
              $baseUrl = "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          }

          $baseUrl = $baseUrl.TrimEnd("/")

          [void](Invoke-VerifiedRequest -Uri "$baseUrl/api/health/ping" -Description "health ping" -ExpectedContent "pong")
          [void](Invoke-VerifiedRequest -Uri "$baseUrl/js/runtime-config.js" -Description "runtime config" -ExpectedContent "window.NoorLocatorRuntimeConfig")
          [void](Invoke-VerifiedRequest -Uri "$baseUrl/" -Description "frontend root" -ExpectedContent "NoorLocator")

          $summaryLines = @(
              "## Deployment smoke test",
              "",
              "- Base URL: $baseUrl",
              "- Verified: `/api/health/ping`",
              "- Verified: `/js/runtime-config.js`",
              "- Verified: `/`"
          )

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($summaryLines -join [Environment]::NewLine)

      - name: Azure logout
        if: always()
        run: az logout
