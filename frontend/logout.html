<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0D2535">
    <title>NoorLocator | Sign-out Moved</title>
    <link rel="icon" type="image/png" href="assets/logo_bkg.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="logout">
    <div data-site-header></div>

    <main class="page-shell">
        <section class="page-hero page-hero--split">
            <div class="page-hero__content">
                <span class="eyebrow">Account navigation</span>
                <h1>Sign-out now lives inside your profile page.</h1>
                <p id="logout-status">Use the combined profile entry in the navigation to open your profile page, review your account details, and sign out from the dedicated profile action.</p>
                <div class="hero__actions">
                    <a id="logout-profile-link" class="button button--primary" href="profile.html">Open profile</a>
                    <a class="button button--secondary" href="login.html">Go to login</a>
                    <a class="button button--ghost" href="index.html">Go to homepage</a>
                </div>
            </div>
            <aside class="hero__panel">
                <img class="site-logo site-logo--auth hero__logo" data-brand-logo src="assets/logo_bkg.png" alt="NoorLocator logo">
            </aside>
        </section>
    </main>

    <div data-site-footer></div>

    <script defer src="js/runtime-config.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/layout.js"></script>
    <script defer src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const profileLink = document.getElementById("logout-profile-link");
            const status = document.getElementById("logout-status");
            const isAuthenticated = window.NoorLocatorAuth?.isAuthenticated?.() === true;

            if (!profileLink || !status || isAuthenticated) {
                return;
            }

            profileLink.href = "login.html";
            profileLink.textContent = "Go to login";
            status.textContent = "You are not signed in right now. Use the login page to start a new NoorLocator session.";
        });
    </script>
</body>
</html>
