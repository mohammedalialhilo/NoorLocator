<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NoorLocator | Register</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">
    <div data-site-header></div>

    <main class="page-shell">
        <section class="page-hero">
            <span class="eyebrow">Community access</span>
            <h1>Create your NoorLocator account</h1>
            <p>Phase 1 keeps the registration form connected to the API while intentionally leaving account persistence for a later delivery phase.</p>
        </section>

        <section class="section">
            <div class="form-shell">
                <form id="register-form" class="form">
                    <div class="form__group">
                        <label class="form__label" for="register-name">Name</label>
                        <input id="register-name" class="form__control" type="text" name="name" placeholder="Your full name" required>
                    </div>
                    <div class="form__group">
                        <label class="form__label" for="register-email">Email</label>
                        <input id="register-email" class="form__control" type="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form__group">
                        <label class="form__label" for="register-password">Password</label>
                        <input id="register-password" class="form__control" type="password" name="password" placeholder="At least 8 characters" required>
                    </div>
                    <div class="button-row">
                        <button class="button button--primary" type="submit">Register</button>
                        <a class="button button--ghost" href="login.html">Already have an account?</a>
                    </div>
                    <p data-form-message="register-form" class="message"></p>
                </form>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script defer src="js/api.js"></script>
    <script defer src="js/layout.js"></script>
    <script defer src="js/app.js"></script>
</body>
</html>
