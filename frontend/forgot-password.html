<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0D2535">
    <title data-i18n="meta.forgotPassword.title">NoorLocator | Forgot Password</title>
    <link rel="icon" type="image/png" href="assets/logo_bkg.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="forgot-password">
    <div data-site-header></div>

    <main class="page-shell">
        <section class="page-hero page-hero--split">
            <div class="page-hero__content">
                <span class="eyebrow" data-i18n="forgot.hero.eyebrow">Password recovery</span>
                <h1 data-i18n="forgot.hero.title">Reset your NoorLocator password</h1>
                <p data-i18n="forgot.hero.description">Enter your email address and NoorLocator will send a secure reset link if the account exists.</p>
            </div>
            <aside class="hero__panel hero__panel--stack">
                <img class="site-logo site-logo--auth hero__logo" data-brand-logo src="assets/logo_bkg.png" alt="NoorLocator logo">
            </aside>
        </section>

        <section class="section">
            <div class="form-shell">
                <form id="forgot-password-form" class="form">
                    <div class="form__group">
                        <label class="form__label" for="forgot-password-email" data-i18n="auth.email.label">Email</label>
                        <input id="forgot-password-email" class="form__control" type="email" name="email" data-i18n-placeholder="auth.email.placeholder" placeholder="you@example.com" required>
                    </div>
                    <div class="button-row">
                        <button class="button button--primary" type="submit" data-i18n="actions.sendResetLink">Send reset link</button>
                        <a class="button button--ghost" href="login.html" data-i18n="actions.backToSignIn">Back to sign in</a>
                    </div>
                    <p data-form-message="forgot-password-form" class="message"></p>
                </form>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script defer src="js/runtime-config.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/i18n.js"></script>
    <script defer src="js/layout.js"></script>
    <script defer src="js/app.js"></script>
</body>
</html>
