<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0D2535">
    <title>NoorLocator | Login</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
    <div data-site-header></div>

    <main class="page-shell">
        <section class="page-hero">
            <span class="eyebrow">Authentication</span>
            <h1>Sign in to NoorLocator</h1>
            <p>Sign in with your NoorLocator account to access contribution workflows, assigned manager tools, and the admin moderation panel based on your role.</p>
        </section>

        <section class="section">
            <div class="form-shell">
                <form id="login-form" class="form">
                    <div class="form__group">
                        <label class="form__label" for="login-email">Email</label>
                        <input id="login-email" class="form__control" type="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form__group">
                        <label class="form__label" for="login-password">Password</label>
                        <input id="login-password" class="form__control" type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="button-row">
                        <button class="button button--primary" type="submit">Log in</button>
                        <a class="button button--ghost" href="register.html">Create account</a>
                    </div>
                    <p data-form-message="login-form" class="message"></p>
                </form>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/layout.js"></script>
    <script defer src="js/app.js"></script>
</body>
</html>
