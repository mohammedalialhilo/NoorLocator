<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0D2535">
    <title data-i18n="meta.resetPassword.title">NoorLocator | Reset Password</title>
    <link rel="icon" type="image/png" href="assets/logo_bkg.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="reset-password">
    <div data-site-header></div>

    <main class="page-shell">
        <section class="page-hero page-hero--split">
            <div class="page-hero__content">
                <span class="eyebrow" data-i18n="reset.hero.eyebrow">Choose a new password</span>
                <h1 data-i18n="reset.hero.title">Set your new NoorLocator password</h1>
                <p data-i18n="reset.hero.description">Use the secure reset link from your email to choose a new password.</p>
            </div>
            <aside class="hero__panel hero__panel--stack">
                <img class="site-logo site-logo--auth hero__logo" data-brand-logo src="assets/logo_bkg.png" alt="NoorLocator logo">
            </aside>
        </section>

        <section class="section">
            <div class="form-shell">
                <form id="reset-password-form" class="form">
                    <input id="reset-password-token" type="hidden" name="token">
                    <div class="form__group">
                        <label class="form__label" for="reset-password-password" data-i18n="auth.newPassword.label">New password</label>
                        <input id="reset-password-password" class="form__control" type="password" name="password" data-i18n-placeholder="auth.password.minPlaceholder" placeholder="At least 8 characters" required>
                    </div>
                    <div class="form__group">
                        <label class="form__label" for="reset-password-confirm-password" data-i18n="auth.confirmPassword.label">Confirm password</label>
                        <input id="reset-password-confirm-password" class="form__control" type="password" name="confirmPassword" data-i18n-placeholder="auth.confirmPassword.placeholder" placeholder="Repeat your password" required>
                    </div>
                    <div class="button-row">
                        <button class="button button--primary" type="submit" data-i18n="actions.resetPassword">Reset password</button>
                        <a class="button button--ghost" href="login.html" data-i18n="actions.backToSignIn">Back to sign in</a>
                    </div>
                    <p data-form-message="reset-password-form" class="message"></p>
                </form>
            </div>
        </section>
    </main>

    <div data-site-footer></div>

    <script defer src="js/runtime-config.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/i18n.js"></script>
    <script defer src="js/layout.js"></script>
    <script defer src="js/app.js"></script>
</body>
</html>
